<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário para adoção de cães</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>  
    <h2> Cadastro para Adoção de Cães </h2>

    <form id="form">
    <input type="text" id="nome" placeholder="Nome completo">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="telefone" placeholder="Telefone">
    <input type="text" id="cpf" placeholder="CPF">
    <input type="number" id="idade" placeholder="Idade">
    <input type="text" id="cidade" placeholder="Cidade">
    <input type="number" id="horas" placeholder="Horas sozinho por dia">
    

    <select id="moradia">
    <option value="">Tipo de Moradia</option>
    <option value="casa">Casa</option>
    <option value="apartamento">Apartamento</option>
    </select>

    <select id="quintal">
    <option value="">Você possui quintal?</option>
    <option value="sim">Sim</option>
    <option value="nao">Não</option>
    </select>

    <select id="pet">
    <option value="">Você tem ou já teve um pet?</option>
    <option value="sim">Sim</option>
    <option value="nao">Não</option>
    </select>

    <textarea id="motivo" placeholder="Motivo da adoção"></textarea>

    <label>
    <input type="checkbox" id="termo"> Aceite o termo de responsabilidade
    </label>

    <button type="submit">Enviar</button>

    </form>

    <div id="resultado"></div>

    <script src="script.js"></script>

</body>
</html>
